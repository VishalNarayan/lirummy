<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Card body -->
  <rect x="6" y="2" width="52" height="60" rx="5" fill="#fff" stroke="#1a1a2e" stroke-width="2.5"/>
  <!-- Jester hat - three pointed cap -->
  <path d="M20,28 Q18,14 24,10 Q28,8 32,14 Q36,8 40,10 Q46,14 44,28" fill="#9333ea"/>
  <!-- Bells on hat tips -->
  <circle cx="24" cy="10" r="2.5" fill="#facc15"/>
  <circle cx="32" cy="13" r="2.5" fill="#facc15"/>
  <circle cx="40" cy="10" r="2.5" fill="#facc15"/>
  <!-- Face -->
  <circle cx="32" cy="32" r="8" fill="#facc15"/>
  <!-- Eyes -->
  <circle cx="29" cy="30" r="1.5" fill="#1a1a2e"/>
  <circle cx="35" cy="30" r="1.5" fill="#1a1a2e"/>
  <!-- Big smile -->
  <path d="M27,34 Q32,40 37,34" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diamond decorations -->
  <polygon points="20,48 24,44 28,48 24,52" fill="#ef4444"/>
  <polygon points="36,48 40,44 44,48 40,52" fill="#ef4444"/>
</svg>
